services:
  hc-server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - RUST_LOG=info
      - HC_SERVER_DATA_DIR=/data
      - HC_SERVER_MAX_INFLIGHT=4
      - HC_SERVER_MAX_PROVE_SECS=300
      # Multi-tenant-lite API keys: "tenant:key" pairs (comma-separated).
      # Clients must send: Authorization: Bearer <key>
      - HC_SERVER_API_KEYS=demo:demo_key
      # Default production posture: disallow arbitrary code; require fixed workload_id.
      - HC_SERVER_ALLOW_CUSTOM_PROGRAMS=false
    volumes:
      - hc_data:/data
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G
        reservations:
          memory: 6G
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    stop_grace_period: 30s

  hc-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/app/hc-mcp-http"]
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      - RUST_LOG=info
      - HC_MCP_HTTP_HOST=0.0.0.0
      - HC_MCP_HTTP_PORT=3001
      - HC_MCP_MAX_INFLIGHT=2
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G
        reservations:
          memory: 2G
    healthcheck:
      test: ["CMD", "curl", "-sf", "-X", "POST", "-H", "Content-Type: application/json", "-d", "{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"initialize\",\"params\":{\"protocolVersion\":\"2025-03-26\",\"capabilities\":{},\"clientInfo\":{\"name\":\"healthcheck\",\"version\":\"1.0\"}}}", "http://localhost:3001/mcp"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    stop_grace_period: 30s

  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - hc-server
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  grafana:
    image: grafana/grafana:11.3.0
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?Set GRAFANA_ADMIN_PASSWORD}
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  alertmanager:
    image: prom/alertmanager:v0.27.0
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    volumes:
      - ./deploy/prometheus/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "9093:9093"
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  billing-webhook:
    build:
      context: .
      dockerfile: deploy/hetzner/Dockerfile.billing
    environment:
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - INTERNAL_SECRET=${INTERNAL_SECRET}
      - HC_TENANT_STORE_PATH=/data/tenant_store.sqlite
      - HC_API_KEYS_FILE=/data/api_keys.txt
      - HC_USAGE_DB_PATH=/data/usage.sqlite
    volumes:
      - hc_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  billing-cron:
    build:
      context: .
      dockerfile: deploy/hetzner/Dockerfile.billing
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "billing-cron: starting usage sync loop (every 60 min)"
        while true; do
          echo "--- sync_usage run at $$(date -u +%Y-%m-%dT%H:%M:%SZ) ---"
          python sync_usage.py 2>&1
          sleep 3600
        done
    environment:
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - HC_USAGE_DB_PATH=/data/usage.sqlite
      - HC_TENANT_STORE_PATH=/data/tenant_store.sqlite
      - STRIPE_METER_EVENT_NAME=${STRIPE_METER_EVENT_NAME:-proof_usage}
      - ALERT_WEBHOOK_URL=${ALERT_WEBHOOK_URL:-}
    volumes:
      - hc_data:/data
    depends_on:
      - billing-webhook
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

volumes:
  hc_data:
  prometheus_data:
