route:
  receiver: email
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: email
    email_configs:
      - to: "${ALERT_EMAIL}"
        from: "alerts@tinyzkp.com"
        smarthost: "${SMTP_HOST}:${SMTP_PORT}"
        auth_username: "${SMTP_USER}"
        auth_password: "${SMTP_PASSWORD}"
        require_tls: true
