# cargo-audit configuration. Mirrors deny.toml [advisories].ignore so
# cargo-audit and cargo-deny share a single source of truth. When
# adding/removing an advisory ignore, update both files.
#
# Rationale for each entry lives in deny.toml. Keep this file's
# comments in sync with that one.

[advisories]
ignore = [
  "RUSTSEC-2026-0097",  # rand 0.10, transitive via rmcp 0.17
  "RUSTSEC-2024-0437",  # protobuf 2.x via prometheus 0.13.4
  "RUSTSEC-2025-0055",  # tracing-subscriber 0.2.25 via ark-relations 0.4
  "RUSTSEC-2024-0388",  # derivative unmaintained, via arkworks
  "RUSTSEC-2024-0436",  # paste unmaintained, via arkworks
]
