<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>__TITLE__</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#050a12; --surface:#0c1424; --surface-2:#0f1a30;
    --border:#152040; --border-light:#1e2d52;
    --text:#e4e9f2; --text-bright:#f4f6fb;
    --muted:#8899b8; --dim:#6b84a6;
    --accent:#2ee8d4; --accent-dim:rgba(46,232,212,.10);
    --green:#34d399; --amber:#fbbf24; --rose:#f87171;
    --mono:'IBM Plex Mono',Consolas,monospace;
    --sans:'IBM Plex Sans',system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{font-family:var(--sans);background:var(--bg);color:var(--text);
    -webkit-font-smoothing:antialiased;line-height:1.55}
  body::before{content:'';position:fixed;inset:0;z-index:-2;
    background-image:radial-gradient(circle,var(--border) .8px,transparent .8px);
    background-size:38px 38px;opacity:.35;pointer-events:none}
  .stage{width:1400px; padding:48px 64px 56px; margin:0 auto}
  .topbar{display:flex;align-items:center;justify-content:space-between;
    margin-bottom:28px}
  .brand{display:flex;align-items:center;gap:14px}
  .brand .logo{font-family:var(--mono);font-weight:700;font-size:22px;
    color:var(--text-bright);letter-spacing:-.02em}
  .brand .logo span{color:var(--accent)}
  .brand .badge{font-family:var(--mono);font-size:11px;letter-spacing:.06em;
    text-transform:uppercase;color:var(--accent);
    border:1px solid var(--accent-dim);background:var(--accent-dim);
    padding:5px 11px;border-radius:999px;font-weight:600}
  .topbar .url{font-family:var(--mono);font-size:13px;color:var(--dim)}
  .caption{font-size:18px;line-height:1.5;color:var(--text);
    margin-bottom:22px;font-weight:400;max-width:1140px}
  .caption strong{color:var(--text-bright);font-weight:600}
  .card{background:var(--surface);border:1px solid var(--border);
    border-radius:14px;overflow:hidden;
    box-shadow:0 1px 0 rgba(255,255,255,.03) inset, 0 8px 30px rgba(0,0,0,.35)}
  .card .head{display:flex;align-items:center;gap:14px;padding:14px 22px;
    border-bottom:1px solid var(--border);background:var(--surface-2)}
  .card .head .dot{width:9px;height:9px;border-radius:50%;
    background:var(--accent);box-shadow:0 0 14px var(--accent)}
  .card .head .tool{font-family:var(--mono);font-size:13.5px;font-weight:600;
    color:var(--text-bright)}
  .card .head .arrow{color:var(--dim);font-family:var(--mono);font-size:12px}
  .card .head .server{font-family:var(--mono);font-size:13px;color:var(--accent)}
  .card .head .meta{margin-left:auto;font-family:var(--mono);font-size:11.5px;
    color:var(--dim);text-transform:uppercase;letter-spacing:.05em}
  .card .body{padding:20px 24px;display:grid;grid-template-columns:1fr;gap:18px}
  .row{display:flex;gap:18px;align-items:flex-start}
  .row .label{flex:0 0 110px;font-family:var(--mono);font-size:11.5px;
    color:var(--muted);text-transform:uppercase;letter-spacing:.06em;
    padding-top:3px;font-weight:600}
  .row .value{flex:1;font-family:var(--mono);font-size:13.5px;color:var(--text);
    word-break:break-all;line-height:1.55}
  .row .value.code{background:var(--surface-2);border:1px solid var(--border);
    border-radius:8px;padding:11px 14px;color:var(--text-bright);font-size:13px}
  .row .value .green{color:var(--green);font-weight:600}
  .row .value .accent{color:var(--accent);font-weight:600}
  .row .value .muted{color:var(--muted)}
  .pill{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);
    font-size:11.5px;font-weight:600;padding:3px 10px;border-radius:999px;
    text-transform:uppercase;letter-spacing:.05em}
  .pill.green{background:rgba(52,211,153,.12);color:var(--green);border:1px solid rgba(52,211,153,.3)}
  .pill.amber{background:rgba(251,191,36,.10);color:var(--amber);border:1px solid rgba(251,191,36,.25)}
  .pill.dim{background:var(--surface-2);color:var(--muted);border:1px solid var(--border)}
  .footer{margin-top:18px;font-size:13px;color:var(--muted);font-family:var(--mono)}
  .footer a{color:var(--accent);text-decoration:none}
  .verdict{display:flex;gap:14px;align-items:center;margin-top:8px;
    padding:14px 18px;background:rgba(52,211,153,.08);
    border:1px solid rgba(52,211,153,.25);border-radius:10px}
  .verdict .icon{width:34px;height:34px;border-radius:50%;
    background:rgba(52,211,153,.18);display:flex;align-items:center;
    justify-content:center;color:var(--green);font-weight:700;font-size:18px}
  .verdict .text{font-family:var(--sans);font-size:15px;color:var(--text-bright)}
  .verdict .text .bold{font-weight:700;color:var(--green)}
  .stack{display:flex;flex-direction:column;gap:14px}
</style>
</head>
<body>
<div class="stage">
  __CONTENT__
</div>
</body>
</html>
