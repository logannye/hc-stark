# Smithery.ai server manifest for TinyZKP.
# Reference: https://smithery.ai/docs/build/project-config

startCommand:
  type: http
  url: https://mcp.tinyzkp.com

name: tinyzkp
displayName: "TinyZKP — Verifiable Receipts for AI Agents"
description: >
  Mint zero-knowledge proofs as a tool call. Six production templates
  (range proof, hash preimage, computation attestation, accumulator step,
  policy compliance, data integrity). Free 100 proofs/month, no credit card.

homepage: https://tinyzkp.com
repository: https://github.com/logannye/hc-stark
license: MIT

categories:
  - developer-tools
  - security

tags:
  - zk
  - stark
  - zero-knowledge
  - proof
  - cryptography
  - mcp

# All connections to mcp.tinyzkp.com today work without authentication;
# the public lane is bounded by HC_MCP_MAX_INFLIGHT. Authenticated requests
# (Authorization: Bearer tzk_...) unlock per-plan rate limits.
configSchema:
  type: object
  properties:
    apiKey:
      type: string
      title: TinyZKP API key
      description: >
        Optional. Get a free key at https://tinyzkp.com/signup (100
        proofs/month, no credit card). Without a key, the public lane is
        bounded by a global concurrency cap.
  required: []

exampleConfig:
  apiKey: tzk_...

# Tools surfaced to Smithery's catalog UI (mirrors crates/hc-mcp/src/lib.rs).
tools:
  - name: list_templates
    description: List all available proof templates with summaries and tags.
  - name: describe_template
    description: Get the full parameter schema and cost category for a template.
  - name: list_workloads
    description: List built-in named workloads suitable for the raw prover.
  - name: get_capabilities
    description: Report server capabilities, supported transports, and tier limits.
  - name: prove_template
    description: Submit a proof job using a named template (recommended path).
  - name: prove_workload
    description: Submit a proof job using a named workload.
  - name: poll_job
    description: Poll the status of a submitted prove job.
  - name: verify_proof
    description: Verify a proof. Always free; never charges quota.
  - name: get_proof
    description: Retrieve the proof bytes for a completed job.
  - name: get_proof_summary
    description: Retrieve a compact summary for a completed job.
