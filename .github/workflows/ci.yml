name: hc-stark CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: fmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: unit tests
        run: cargo test --workspace

      - name: Sanity suite
        run: ./scripts/test_suite.sh sanity

      - name: Stress suite
        run: ./scripts/test_suite.sh stress

      - name: Ladder suite
        run: ./scripts/test_suite.sh ladder

      - name: Prover benchmark snapshot
        run: cargo run -p hc-cli -- bench --iterations 2 --block-size 8 --scenario prover

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hc-stark-benchmarks
          path: |
            benchmarks/latest.json
            benchmarks/stress_latest.json
            benchmarks/ladder_latest.json
            benchmarks/ladder_latest.csv
          if-no-files-found: ignore
name: CI

on:
  push:
    branches:
      - main
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Tests
        run: cargo test --workspace --all-targets --no-fail-fast

      - name: Docs
        run: cargo doc --workspace --no-deps

