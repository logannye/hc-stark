name: hc-stark CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: fmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: unit tests
        run: cargo test --workspace

      # CI runs on Ubuntu/x86_64. Exercise the AVX2 backend explicitly so
      # the dormant SIMD code in hc-simd doesn't bitrot until someone
      # finally wires it into the hot paths. NEON tests run on macos/aarch64
      # if/when a macos matrix is added.
      - name: hc-simd avx2 tests (x86_64)
        if: runner.arch == 'X64'
        run: cargo test -p hc-simd --features avx2

      # Compile the criterion regression benches so they don't bitrot.
      # Full baseline-comparison gating is a follow-up — for now, the
      # build gate alone catches API drift in the bench file.
      - name: criterion benches compile
        run: cargo bench -p hc-core --bench field_arithmetic --no-run

      # Smoke-run the benches with --quick to verify they execute end-to-end
      # in CI hardware. --quick caps each measurement at ~1s so total runtime
      # stays bounded.
      - name: criterion benches smoke run
        run: cargo bench -p hc-core --bench field_arithmetic -- --quick --warm-up-time 1 --measurement-time 2

      - name: scaling invariant tests
        run: cargo test -p hc-bench --features scaling-tests

      - name: recursion circuit tests
        run: cargo test -p hc-recursion

      - name: cargo audit
        run: |
          cargo install cargo-audit --locked
          cargo audit --deny warnings

      - name: cargo deny
        run: |
          cargo install cargo-deny --locked
          cargo deny check

      - name: Sanity suite
        run: ./scripts/test_suite.sh sanity

      - name: Stress suite
        run: ./scripts/test_suite.sh stress

      - name: Ladder suite
        run: ./scripts/test_suite.sh ladder

      - name: Prover benchmark snapshot
        run: cargo run -p hc-cli -- bench --iterations 2 --block-size 8 --scenario prover

      - name: Verifier benchmark snapshot
        run: cargo run -p hc-cli -- bench --iterations 5 --scenario verifier --metrics-dir benchmarks/verifier --metrics-tag ci

      - name: Recursive aggregation smoke test
        run: |
          cargo run -p hc-cli -- prove --output /tmp/proof_a.json
          cargo run -p hc-cli -- prove --output /tmp/proof_b.json
          cargo run -p hc-cli -- recursion --proof /tmp/proof_a.json --proof /tmp/proof_b.json --metrics benchmarks/recursion_latest.json --artifact benchmarks/recursion_latest_artifact.json

      - name: Check benchmark thresholds
        run: ./scripts/check_bench_thresholds.py benchmarks/latest.json benchmarks/ladder_latest.json

      - name: Height benchmark snapshot
        run: cargo run -p hc-cli -- bench --scenario height --leaves 65536 --auto-block-size --samples 3

      - name: Height dashboard summary
        run: python3 scripts/aggregate_height_metrics.py --history benchmarks/height_history.jsonl --out-dir benchmarks

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hc-stark-benchmarks
          path: |
            benchmarks/latest.json
            benchmarks/stress_latest.json
            benchmarks/ladder_latest.json
            benchmarks/ladder_latest.csv
            benchmarks/recursion_latest.json
            benchmarks/recursion_latest_artifact.json
            benchmarks/height_latest.csv
            benchmarks/height_history.csv
            benchmarks/height_history.jsonl
            benchmarks/height_dashboard.md
            benchmarks/height_trend.png
            benchmarks/verifier/latest.json
            benchmarks/verifier/verifier_history.jsonl
          if-no-files-found: ignore

