name: Publish SDKs

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build and publish
        working-directory: clients/python
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          pip install build twine
          python -m build
          twine upload dist/*

  publish-typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Build and publish
        working-directory: clients/typescript
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm install
          npm run build
          npm publish

  publish-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish
        working-directory: clients/rust
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: cargo publish

  publish-wasm:
    name: Publish WASM verifier to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Build WASM package
        working-directory: crates/hc-wasm
        run: ./build.sh
      - name: Publish to npm
        working-directory: crates/hc-wasm/pkg
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

  build-mcp-binaries:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            name: hc-mcp-macos-arm64
          - os: macos-13
            target: x86_64-apple-darwin
            name: hc-mcp-macos-x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: hc-mcp-linux-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build MCP binaries
        run: cargo build --release --target ${{ matrix.target }} -p hc-mcp
      - name: Package
        run: |
          cp target/${{ matrix.target }}/release/hc-mcp-stdio ${{ matrix.name }}-stdio
          cp target/${{ matrix.target }}/release/hc-mcp-http ${{ matrix.name }}-http
          chmod +x ${{ matrix.name }}-stdio ${{ matrix.name }}-http
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.name }}-stdio
            ${{ matrix.name }}-http
